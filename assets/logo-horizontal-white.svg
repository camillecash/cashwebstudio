<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <!-- Symbol -->
  <g transform="translate(20, 10)">
    <g transform="rotate(0 50 50)">
      <!-- Perimeter circular guides -->
      <circle cx="50" cy="50" r="40" fill="none" stroke="#91b3ff" stroke-width="1" stroke-dasharray="3,3" opacity="0.65" />
      <line x1="10" y1="50" x2="90" y2="50" stroke="#91b3ff" stroke-width="1" stroke-dasharray="2,4" opacity="0.15" />
      <line x1="50" y1="10" x2="50" y2="90" stroke="#91b3ff" stroke-width="1" stroke-dasharray="2,4" opacity="0.15" />
      <!-- Left Angle Bracket (<) -->
      <path d="M 33,32 L 15,50 L 33,68" fill="none" stroke="#91b3ff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
      <!-- Right Angle Bracket (>) -->
      <path d="M 67,32 L 85,50 L 67,68" fill="none" stroke="#91b3ff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
      <!-- Forward Slash (/) -->
      <path d="M 43,72 L 57,28" fill="none" stroke="#91b3ff" stroke-width="2.2" stroke-linecap="round" />
      <!-- Core Balance Dots/Nodes -->
      <circle cx="33" cy="32" r="1.76" fill="#0b0f19" stroke="#91b3ff" stroke-width="2.2" />
      <circle cx="67" cy="32" r="1.76" fill="#0b0f19" stroke="#91b3ff" stroke-width="2.2" />
      <circle cx="33" cy="68" r="1.76" fill="#0b0f19" stroke="#91b3ff" stroke-width="2.2" />
      <circle cx="67" cy="68" r="1.76" fill="#0b0f19" stroke="#91b3ff" stroke-width="2.2" />
      <circle cx="50" cy="50" r="2.64" fill="#91b3ff" />
    </g>
  </g>
  <!-- Business Typography -->
  <text x="135" y="62" fill="#ffffff" font-family="'Space Grotesk', system-ui, sans-serif" font-size="24" font-weight="bold" letter-spacing="2.5"><tspan>CASH </tspan><tspan fill="#91b3ff">WEB STUDIO</tspan></text>
  <!-- Custom Tagline Subtitle -->
  <text x="135" y="86" fill="#ffffff" opacity="0.6" font-family="'Space Grotesk', system-ui, sans-serif" font-size="10" letter-spacing="3.5">WEB DESIGN &amp; DEVELOPMENT</text>
</svg>